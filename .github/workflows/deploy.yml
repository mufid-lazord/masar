name: نشر مَسَار على الويب

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: تنزيل الكود
        uses: actions/checkout@v4

      - name: تجهيز Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: توليد دعم الويب
        run: flutter create --platforms=web .

      - name: تنزيل الحزم
        run: flutter pub get

      - name: بناء نسخة الويب
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: رفع الملفات
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: النشر على GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
